<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Tomb Project - UDU Studios</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

    <div id="game-container">
        
        <div id="main-menu">
            <h1 class="game-title">ZOMBIE<br>TOMB</h1>
            
            <div class="button-container">
                <button id="btn-play" class="menu-button">JUGAR</button>
                <button id="btn-shop" class="menu-button" onclick="abrirTienda()">TIENDA</button>
                <button id="btn-reset" class="menu-button" style="background-color: #ff4d4d; color: white;">BORRAR PROGRESO</button>
                <button id="btn-credits" class="menu-button secondary">CRÉDITOS</button>
                
                <p class="notes-next-update"><span class="p-purple">Notas de la próxima update (1.3)</span>:<br> Se volverá disponible el botón "créditos" y<br> más niveles... próximamente. Esperamos que te haya gustado la update 1.2 :D</p>
            </div>
            
            <img src="assets/ui/logo_UDU_Studios-pixelart.png" alt="UDU Studios" class="brand-logo">

        <div id="auth-section">
        <a href="../Signin_UDU_Studios/index.html" id="login-link" style="min-width: 140px;" onclick="alert('AVISO: Al volver serás redirigido a otro sitio de UDU Studios, no a este.')">
            <div class="loader"></div> Verificando...
        </a>
        </div>

        </div>
    </div>

    <div id="level-selector" style="display: none;">
    <button id="btn-back-main" class="back-button">< VOLVER</button>
    <h2 class="section-title">NIVELES</h2>
    
    <div class="timeline-wrapper">
        <div class="timeline-line"></div>
        <div id="levels-container">
            </div>
    </div>
    
    <p class="coins-display">PUNTOS: <span id="total-points">0</span></p>
    </div>

    <div id="shop-container" style="display: none; position: absolute;">
        <header>
            <h1>TIENDA DE ZOMBIE TOMB</h1>
            <div id="coin-status">
                Monedas: <span id="shop-coins">0</span> 🪙<br>
                Puntos recogidos: <span id="points">0</span> ⭐<br>
                <button onclick="canjearPuntos()" style="margin-top:10px; padding:5px 10px; font-size:0.6em;">
                Canjear 100 puntos por 10 🪙
                </button>
            </div>
        </header>

        <main id="items-grid">
            </main>

        <footer>
            <button id="btn-back2" onclick="volverAlMenu()">VOLVER AL MENÚ</button>
        </footer>
    </div>

    <script type="module" src="game.js"></script>
    <script src="tienda/shop.js"></script>
    <script>
        function abrirTienda() {
    // Ocultamos el menú y mostramos la tienda
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('shop-container').style.display = 'block';
    
    // Forzamos a que la tienda empiece arriba del todo
    document.getElementById('shop-container').scrollTop = 0;
    
    // Cargamos los datos actualizados
    renderizarTienda();
}

function volverAlMenu() {
    // Ocultamos la tienda y mostramos el menú
    document.getElementById('shop-container').style.display = 'none';
    document.getElementById('main-menu').style.display = 'flex';
    
    // EL TRUCO MÁGICO: Reseteamos el scroll del menú para que el título se vea perfecto
    const mainMenu = document.getElementById('main-menu');
    mainMenu.scrollTop = 0;
    window.scrollTo(0, 0);
}
    </script>

</body>
</html>
